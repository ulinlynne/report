<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可愛運動回報系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
    }
  }
  </script>

  <style>
    .animate-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(15px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>
</head>
<body class="bg-[#FFF5F7]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, getDoc, addDoc, deleteDoc, onSnapshot, updateDoc } from 'firebase/firestore';
    import { 
      Heart, Dumbbell, Calendar, LogOut, CheckCircle2, Trophy, Sparkles, User, 
      ArrowRight, History, Clock, Plus, Trash2, Edit2, X, Save, Flag, Zap, 
      CalendarCheck, ChevronDown, ChevronUp, Medal, Star, Crown, PartyPopper, 
      PlayCircle, BookOpen, Video
    } from 'lucide-react';

    // --- 妳專屬的 Firebase 雲端大腦設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyBNIFEJdJ6Ezi1HiNiCO5nRjcdKwxwTG0k",
      authDomain: "report-67a9c.firebaseapp.com",
      projectId: "report-67a9c",
      storageBucket: "report-67a9c.firebasestorage.app",
      messagingSenderId: "633143727143",
      appId: "1:633143727143:web:743ab5443e72cfc7966a02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'cute-fitness-system-v5';

    const ACHIEVEMENTS = {
      10: { title: "初萌小仙芽", color: "from-green-300 to-teal-400", icon: <Sparkles className="text-white" /> },
      20: { title: "霓裳輕盈仙子", color: "from-purple-400 to-pink-500", icon: <Medal className="text-white" /> },
      30: { title: "凌波閃耀上仙", color: "from-blue-400 to-indigo-500", icon: <Star className="text-white" fill="white" /> }
    };

    const getAchievementByDays = (days) => {
      if (days >= 30) return ACHIEVEMENTS[30];
      if (days >= 20) return ACHIEVEMENTS[20];
      if (days >= 10) return ACHIEVEMENTS[10];
      return null;
    };

    function App() {
      const [user, setUser] = useState(null);
      const [sessionUser, setSessionUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [reports, setReports] = useState([]);
      const [members, setMembers] = useState([]);
      const [menus, setMenus] = useState([]); 
      const [loading, setLoading] = useState(true);
      const [message, setMessage] = useState(null);
      const [showLeaderboard, setShowLeaderboard] = useState(false);
      const [unlockedAchievement, setUnlockedAchievement] = useState(null);

      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (err) { console.error(err); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u); setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const reportsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
        const unsubReports = onSnapshot(reportsRef, (s) => setReports(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        
        const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const unsubMembers = onSnapshot(membersRef, (s) => setMembers(s.docs.map(d => ({ id: d.id, ...d.data() }))));

        const menusRef = collection(db, 'artifacts', appId, 'public', 'data', 'menus');
        const unsubMenus = onSnapshot(menusRef, (s) => setMenus(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        
        return () => { unsubReports(); unsubMembers(); unsubMenus(); };
      }, [user]);

      const showMessage = (msg) => {
        setMessage(msg); setTimeout(() => setMessage(null), 3000);
      };

      const handleLogin = async (name) => {
        const trimmedName = name.trim();
        if (!trimmedName) return showMessage("名字不能空空的喔 🌸");
        setLoading(true);
        if (trimmedName.toLowerCase() === 'admin') {
          setIsAdmin(true); setSessionUser('管理員');
        } else {
          try {
            const memberRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', trimmedName);
            const memberSnap = await getDoc(memberRef);
            if (!memberSnap.exists()) await setDoc(memberRef, { name: trimmedName, createdAt: new Date().toISOString() });
            setIsAdmin(false); setSessionUser(trimmedName);
          } catch (err) {}
        }
        setLoading(false);
        showMessage(`歡迎回來，${trimmedName} ✨`);
      };

      const handleLogout = () => {
        setSessionUser(null); setIsAdmin(false); showMessage("明天也要加油喔！🌸");
      };

      const submitReport = async () => {
        if (!user || !sessionUser) return;
        const todayStr = new Date().toISOString().split('T')[0];
        if (reports.some(r => r.userName === sessionUser && r.date === todayStr)) return showMessage("今天已經打過卡囉！🌸");

        try {
          const currentDays = new Set(reports.filter(r => r.userName === sessionUser).map(r => r.date)).size;
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
            userName: sessionUser, userId: user.uid, date: todayStr, timestamp: new Date().toISOString()
          });
          showMessage("打卡成功！妳太棒了 🎊");
          if (ACHIEVEMENTS[currentDays + 1]) setUnlockedAchievement({ day: currentDays + 1, ...ACHIEVEMENTS[currentDays + 1] });
        } catch (err) { showMessage("打卡失敗 🌸"); }
      };

      // --- 管理員核心功能 ---
      const adminAddMember = async (name) => {
        const n = name.trim(); if (!n) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', n), { name: n, createdAt: new Date().toISOString() });
          showMessage(`已新增成員：${n} 🌸`);
        } catch (err) { showMessage("新增失敗 🌸"); }
      };

      const adminDeleteMember = async (id) => {
        setLoading(true);
        try {
          const userReports = reports.filter(r => r.userName === id);
          for (const report of userReports) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', report.id));
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id));
          showMessage(`已移出成員並清除 ${userReports.length} 筆紀錄 🌸`);
        } catch (err) { showMessage("刪除失敗 🌸"); }
        setLoading(false);
      };

      const adminUpdateMember = async (oldId, newName) => {
        const n = newName.trim(); if (!n || oldId === n) return;
        setLoading(true);
        try {
          const oldReports = reports.filter(r => r.userName === oldId);
          for (const r of oldReports) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', r.id), { userName: n });
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', n), { name: n, createdAt: new Date().toISOString() });
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', oldId));
          showMessage(`更名成功並同步 ${oldReports.length} 筆紀錄 ✨`);
        } catch (err) { showMessage("更新失敗 🌸"); }
        setLoading(false);
      };

      const adminDeleteReport = async (id) => {
        try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id)); showMessage("紀錄已刪除 🌸"); } 
        catch (err) { showMessage("刪除失敗 🌸"); }
      };

      const adminManualReport = async (name, date) => {
        if (!name || !date) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
            userName: name, userId: "admin-manual", date: date, timestamp: new Date().toISOString()
          });
          showMessage(`已幫 ${name} 補打卡 🌸`);
        } catch (err) { showMessage("操作失敗 🌸"); }
      };

      // 菜單存儲
      const adminSaveMenu = async (date, content, videoUrl) => {
        if (!date || !content.trim()) return showMessage("日期與內容不能為空 🌸");
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'menus', date), {
            content: content.trim(), videoUrl: videoUrl.trim(), updatedAt: new Date().toISOString()
          });
          showMessage(`已發布 ${date} 的菜單 🌸`);
        } catch (err) { showMessage("菜單發布失敗 🌸"); }
      };

      const adminDeleteMenu = async (date) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'menus', date));
          showMessage(`已刪除 ${date} 的菜單 🌸`);
        } catch (err) { showMessage("刪除失敗 🌸"); }
      };

      // --- 計算屬性 ---
      const todayStr = new Date().toISOString().split('T')[0];
      const todayReportsList = useMemo(() => reports.filter(r => r.date === todayStr), [reports, todayStr]);
      const todayMenu = useMemo(() => menus.find(m => m.id === todayStr), [menus, todayStr]);
      
      const stats = useMemo(() => {
        const total = members.length;
        const done = todayReportsList.length;
        const now = new Date();
        let target = new Date(now.getFullYear(), 4, 17);
        if (now > target) target.setFullYear(now.getFullYear() + 1);
        const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
        return { percent: total > 0 ? Math.round((done / total) * 100) : 0, diff, total, done };
      }, [members, todayReportsList]);

      const rankingList = useMemo(() => {
        const counts = {};
        reports.forEach(r => {
          if (!counts[r.userName]) counts[r.userName] = new Set();
          counts[r.userName].add(r.date);
        });
        return Object.entries(counts).map(([name, set]) => ({ name, count: set.size })).sort((a, b) => b.count - a.count);
      }, [reports]);

      if (loading) return (
        <div className="min-h-screen bg-[#FFF5F7] flex items-center justify-center text-pink-400">
          <div className="animate-bounce flex flex-col items-center gap-4"><Heart size={48} fill="currentColor" /><span className="font-black text-pink-300">系統處理中...</span></div>
        </div>
      );

      return (
        <div className="min-h-screen bg-[#FFF5F7] text-gray-700 font-sans pb-20 selection:bg-pink-100">
          <header className="bg-white/90 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50 shadow-sm">
            <div className="max-w-md mx-auto flex justify-between items-center">
              <div className="flex items-center gap-2">
                <div className="bg-pink-100 p-2 rounded-2xl text-pink-500 shadow-inner"><Dumbbell size={22} /></div>
                <h1 className="text-xl font-black text-pink-600 tracking-tighter">體能小仙女</h1>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => setShowLeaderboard(true)} className="bg-yellow-100 p-2.5 rounded-full text-yellow-600 shadow-sm hover:scale-105 transition-transform"><Trophy size={20} /></button>
                {sessionUser && <button onClick={handleLogout} className="flex items-center gap-1 text-gray-400 text-xs font-black bg-gray-50 px-3 py-2 rounded-full hover:bg-rose-50 hover:text-rose-400 transition-colors"><LogOut size={14} /> 登出</button>}
              </div>
            </div>
          </header>

          <main className="max-w-md mx-auto p-4 space-y-6">
            {message && (
              <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-white/95 border-2 border-pink-200 px-6 py-3 rounded-full shadow-2xl z-[60] animate-in fade-in slide-in-from-top-4 duration-300">
                <span className="text-pink-500 font-black">{message}</span>
              </div>
            )}

            <div className="bg-white p-5 rounded-[32px] shadow-sm border border-pink-50 space-y-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="bg-yellow-100 p-1.5 rounded-lg text-yellow-500 animate-pulse"><Zap size={16} fill="currentColor" /></div>
                  <span className="text-xs font-black text-gray-600">今日達成比例</span>
                </div>
                <span className="text-sm font-black text-pink-500">{stats.percent}%</span>
              </div>
              <div className="h-4 bg-gray-50 rounded-full overflow-hidden border border-gray-100 shadow-inner">
                <div className="h-full bg-gradient-to-r from-pink-300 via-rose-400 to-pink-500 transition-all duration-1000 ease-out" style={{ width: `${stats.percent}%` }} />
              </div>
              <div className="flex justify-between items-center text-[10px] text-gray-400 font-black tracking-widest uppercase">
                <span>已打卡: {stats.done} / {stats.total}</span>
                <span className="flex items-center gap-1 text-pink-300">每一分努力都值得 🌸</span>
              </div>
            </div>

            {!sessionUser ? (
              <LoginView onLogin={handleLogin} todayReports={todayReportsList} allMembers={members} diffDays={stats.diff} />
            ) : isAdmin ? (
              <AdminDashboard reports={reports} members={members} menus={menus} onAddMember={adminAddMember} onDeleteMember={adminDeleteMember} onUpdateMember={adminUpdateMember} onDeleteReport={adminDeleteReport} onManualReport={adminManualReport} onSaveMenu={adminSaveMenu} onDeleteMenu={adminDeleteMenu} />
            ) : (
              <UserDashboard userName={sessionUser} history={reports.filter(r => r.userName === sessionUser).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))} hasReportedToday={todayReportsList.some(r => r.userName === sessionUser)} onSubmit={submitReport} diffDays={stats.diff} todayMenu={todayMenu} />
            )}
          </main>

          {/* 排行榜彈窗 */}
          {showLeaderboard && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-in fade-in">
              <div className="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden animate-in zoom-in-95">
                <div className="bg-gradient-to-br from-yellow-400 via-orange-400 to-rose-400 p-8 text-white text-center relative">
                  <button onClick={() => setShowLeaderboard(false)} className="absolute top-6 right-6 bg-white/20 p-2 rounded-full"><X size={20} /></button>
                  <Trophy size={56} className="mx-auto mb-3 drop-shadow-xl" fill="currentColor" />
                  <h2 className="text-3xl font-black tracking-tighter">勤奮仙女榜</h2><p className="text-xs opacity-90 font-bold mt-1">每一滴汗水都在閃耀 ✨</p>
                </div>
                <div className="max-h-[50vh] overflow-y-auto p-6 space-y-3">
                  {rankingList.length === 0 ? <div className="text-center text-gray-400 py-4 text-sm">還沒有人上榜喔，快來搶下第一名！</div> :
                  rankingList.map((item, idx) => {
                    const achievement = getAchievementByDays(item.count);
                    return (
                      <div key={idx} className="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div className="flex items-center gap-4">
                          <div className="w-8 flex justify-center text-lg font-black italic">{idx === 0 ? <Crown className="text-yellow-500" /> : idx === 1 ? <Medal className="text-gray-400" /> : idx === 2 ? <Medal className="text-orange-500" /> : idx + 1}</div>
                          <div className="flex flex-col">
                            <span className="font-black text-gray-700 text-lg leading-tight">{item.name}</span>
                            {achievement && <div className={`mt-0.5 text-[9px] font-black px-1.5 py-0.5 rounded bg-gradient-to-r ${achievement.color} text-white inline-block w-fit`}>{achievement.title}</div>}
                          </div>
                        </div>
                        <div className="text-right"><div className="text-2xl font-black text-yellow-600 leading-none">{item.count}</div><div className="text-[10px] text-gray-400 font-black mt-1 uppercase tracking-widest">Days</div></div>
                      </div>
                    );
                  })}
                </div>
                <div className="p-6 bg-gray-50"><button onClick={() => setShowLeaderboard(false)} className="w-full bg-white text-gray-500 py-4 rounded-3xl font-black text-sm shadow-sm border border-gray-200 active:scale-95 transition-transform">返回系統</button></div>
              </div>
            </div>
          )}

          {/* 成就彈窗 */}
          {unlockedAchievement && (
            <div className="fixed inset-0 bg-pink-500/90 backdrop-blur-xl z-[200] flex items-center justify-center p-8 animate-in fade-in">
              <div className="bg-white rounded-[48px] w-full max-w-sm p-10 text-center space-y-6 shadow-2xl animate-in zoom-in-50 duration-500">
                <div className={`w-28 h-28 rounded-[40px] bg-gradient-to-br ${unlockedAchievement.color} flex items-center justify-center shadow-2xl rotate-12 scale-110 mb-6 mx-auto`}>
                  {React.cloneElement(unlockedAchievement.icon, { size: 56 })}
                </div>
                <div className="space-y-3"><h3 className="text-gray-400 text-sm font-black tracking-widest uppercase">Level Up!</h3><h2 className="text-4xl font-black text-gray-800 tracking-tighter">{unlockedAchievement.title}</h2><p className="text-pink-500 font-bold text-lg">妳已成功打卡 <span className="text-3xl">{unlockedAchievement.day}</span> 天 ✨</p></div>
                <button onClick={() => setUnlockedAchievement(null)} className={`w-full bg-gradient-to-r ${unlockedAchievement.color} text-white py-5 rounded-[24px] font-black text-xl shadow-lg hover:brightness-105 active:scale-95 transition-all`}>收下榮耀 💖</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function LoginView({ onLogin, todayReports, allMembers, diffDays }) {
      const [name, setName] = useState('');
      const pendingMembers = useMemo(() => {
        const todayDoneNames = todayReports.map(r => r.userName);
        return allMembers.filter(m => !todayDoneNames.includes(m.name));
      }, [allMembers, todayReports]);

      return (
        <div className="flex flex-col items-center space-y-8 animate-in fade-in duration-700">
          <div className="relative pt-4 text-center">
            <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=400&h=400&fit=crop" alt="login-image" className="w-40 h-40 rounded-[40px] border-4 border-white shadow-2xl object-cover rotate-3 mx-auto" />
            <div className="mt-4"><h2 className="text-2xl font-black text-gray-800 tracking-tight">運動時間到囉！🌸</h2><p className="text-gray-400 text-sm">輸入名字或點擊下方快捷鍵進入</p></div>
          </div>
          <div className="w-full space-y-4">
            <div className="relative">
              <User className="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300" size={20} />
              <input type="text" value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && onLogin(name)} placeholder="妳的名字" className="w-full pl-12 pr-4 py-4 rounded-3xl border-2 border-pink-100 focus:border-pink-300 outline-none shadow-sm text-lg transition-all bg-white" />
            </div>
            <button onClick={() => onLogin(name)} className="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white py-4 rounded-3xl font-black text-lg shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">進入系統 <ArrowRight size={20} /></button>
          </div>
          <div className="w-full space-y-6 pt-4 border-t border-pink-100">
            <div className="space-y-3">
              <h3 className="font-black text-green-600 flex items-center gap-2 px-2 text-xs uppercase tracking-wider"><CheckCircle2 size={16}/> 今日已達成 ({todayReports.length})</h3>
              <div className="flex flex-wrap gap-2 px-1">
                {todayReports.map((report, idx) => (
                  <button key={idx} onClick={() => onLogin(report.userName)} className="bg-white text-green-600 px-3 py-1.5 rounded-xl font-bold text-xs shadow-sm border border-green-50 flex items-center gap-1.5 transition-all"><div className="w-4 h-4 bg-green-100 rounded-full flex items-center justify-center text-[8px]">{report.userName?.[0]}</div>{report.userName}</button>
                ))}
              </div>
            </div>
            <div className="space-y-3">
              <h3 className="font-black text-pink-400 flex items-center gap-2 px-2 text-xs uppercase tracking-wider"><Clock size={16}/> 等妳來打卡 ({pendingMembers.length})</h3>
              <div className="flex flex-wrap gap-2 px-1">
                {pendingMembers.map((member, idx) => (
                  <button key={idx} onClick={() => onLogin(member.name)} className="bg-white text-gray-500 px-3 py-1.5 rounded-xl font-medium text-xs border border-pink-50 flex items-center gap-1.5 shadow-sm transition-all active:scale-95"><div className="w-4 h-4 bg-gray-100 rounded-full flex items-center justify-center text-[8px]">{member.name?.[0]}</div>{member.name}</button>
                ))}
              </div>
            </div>
          </div>
          <div className="bg-white w-full p-4 rounded-[24px] shadow-sm border border-pink-50 flex items-center justify-between mt-8 pb-10">
            <div className="flex items-center gap-3">
              <div className="bg-rose-100 p-2 rounded-xl text-rose-500"><Flag size={20} /></div>
              <div><div className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">距離 5/17 目標</div><div className="text-lg font-black text-gray-800">還有 <span className="text-rose-500">{diffDays}</span> 天</div></div>
            </div>
            <div className="bg-pink-50 px-3 py-1 rounded-full text-[10px] font-bold text-pink-400">加油姊妹們！</div>
          </div>
        </div>
      );
    }

    function UserDashboard({ userName, history, hasReportedToday, onSubmit, diffDays, todayMenu }) {
      const totalCheckInDays = useMemo(() => new Set(history.map(r => r.date)).size, [history]);
      const achievement = getAchievementByDays(totalCheckInDays);

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div className="bg-white rounded-[32px] p-6 shadow-xl border border-pink-50 relative overflow-hidden">
            <div className="absolute top-[-20px] left-[-20px] w-24 h-24 bg-pink-50 rounded-full opacity-50" />
