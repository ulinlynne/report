<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可愛運動回報系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
    }
  }
  </script>

  <style>
    .animate-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(15px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>
</head>
<body class="bg-[#FFF5F7]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, getDoc, addDoc, deleteDoc, onSnapshot } from 'firebase/firestore';
    import { 
      Heart, Dumbbell, Calendar, LogOut, CheckCircle2, Trophy, ClipboardList, 
      Sparkles, User, ArrowRight, History, Clock, Plus, Trash2, Edit2, 
      X, Save, Flag, Zap, CalendarCheck, ChevronDown, ChevronUp, Medal, Star, 
      Crown, PartyPopper
    } from 'lucide-react';

    // --- Firebase 雲端大腦設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyBNIFEJdJ6Ezi1HiNiCO5nRjcdKwxwTG0k",
      authDomain: "report-67a9c.firebaseapp.com",
      projectId: "report-67a9c",
      storageBucket: "report-67a9c.firebasestorage.app",
      messagingSenderId: "633143727143",
      appId: "1:633143727143:web:743ab5443e72cfc7966a02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'cute-fitness-system-v4';

    const ACHIEVEMENTS = {
      10: { title: "初萌小仙芽", color: "from-green-300 to-teal-400", icon: <Sparkles className="text-white" /> },
      20: { title: "霓裳輕盈仙子", color: "from-purple-400 to-pink-500", icon: <Medal className="text-white" /> },
      30: { title: "凌波閃耀上仙", color: "from-blue-400 to-indigo-500", icon: <Star className="text-white" fill="white" /> }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [sessionUser, setSessionUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [members, setMembers] = useState([]);
      const [reports, setReports] = useState([]);
      
      const [loading, setLoading] = useState(true);
      const [message, setMessage] = useState(null);
      const [showLeaderboard, setShowLeaderboard] = useState(false);
      const [unlockedAchievement, setUnlockedAchievement] = useState(null);

      // 初始化 Firebase 登入與資料監聽
      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } 
          catch (err) { console.error("Auth init failed:", err); }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const reportsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
        const unsubReports = onSnapshot(reportsRef, (snapshot) => {
          setReports(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const unsubMembers = onSnapshot(membersRef, (snapshot) => {
          setMembers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        return () => { unsubReports(); unsubMembers(); };
      }, [user]);

      const showMessage = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(null), 3000);
      };

      const handleLogin = async (name) => {
        const trimmedName = name.trim();
        if (!trimmedName) { showMessage("名字不能空空的喔 🌸"); return; }

        setLoading(true);
        if (trimmedName.toLowerCase() !== 'admin') {
          try {
            const memberRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', trimmedName);
            const memberSnap = await getDoc(memberRef);
            if (!memberSnap.exists()) {
              await setDoc(memberRef, { name: trimmedName, createdAt: new Date().toISOString() });
            }
          } catch (err) { console.error(err); }
        }

        setTimeout(() => {
          if (trimmedName.toLowerCase() === 'admin') { 
            setIsAdmin(true); 
            setSessionUser('管理員'); 
          } else { 
            setIsAdmin(false); 
            setSessionUser(trimmedName); 
          }
          setLoading(false);
          showMessage(`歡迎回來，${trimmedName} ✨`);
        }, 500);
      };

      const handleLogout = () => {
        setLoading(true);
        setTimeout(() => {
          setSessionUser(null); 
          setIsAdmin(false); 
          setLoading(false);
          showMessage("登出成功，明天也要加油喔！🌸");
        }, 500);
      };

      const submitReport = async () => {
        if (!user || !sessionUser) return;
        const today = new Date().toISOString().split('T')[0];
        
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
            userName: sessionUser,
            userId: user.uid,
            date: today,
            timestamp: new Date().toISOString(),
            status: 'completed'
          });
          
          showMessage("回報成功！妳真的太棒了 🎊");

          // 計算成就
          const userReports = reports.filter(r => r.userName === sessionUser);
          const currentDays = new Set(userReports.map(r => r.date)).size;
          const newDays = currentDays + 1; // 包含今天
          if (ACHIEVEMENTS[newDays]) {
            setUnlockedAchievement({ day: newDays, ...ACHIEVEMENTS[newDays] });
          }
        } catch (err) {
          showMessage("回報失敗，請重試 🌸");
        }
      };

      // --- 管理員操作 (Firebase版) ---
      const adminAddMember = async (name) => {
        if (!name.trim()) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', name.trim()), {
            name: name.trim(),
            createdAt: new Date().toISOString()
          });
          showMessage(`已新增成員：${name} 🌸`);
        } catch (err) { showMessage("新增失敗 🌸"); }
      };

      const adminDeleteMember = async (id) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id));
          showMessage(`已刪除成員 🌸`);
        } catch (err) { showMessage("刪除失敗 🌸"); }
      };

      const adminDeleteReport = async (reportId) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', reportId));
          showMessage("紀錄已刪除 🌸");
        } catch (err) { showMessage("刪除失敗 🌸"); }
      };

      const adminManualReport = async (memberName, reportDate) => {
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
            userName: memberName,
            userId: "admin-manual",
            date: reportDate,
            timestamp: new Date().toISOString(),
            status: 'completed'
          });
          showMessage(`已幫 ${memberName} 補打卡 (${reportDate}) 🌸`);
        } catch (err) { showMessage("補打卡失敗 🌸"); }
      };

      // --- 資料計算 ---
      const todayAllReports = useMemo(() => {
        const today = new Date().toISOString().split('T')[0];
        return reports.filter(r => r.date === today);
      }, [reports]);

      const userHistory = useMemo(() => {
        const history = reports.filter(r => r.userName === sessionUser);
        return history.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      }, [reports, sessionUser]);

      const hasReportedToday = useMemo(() => {
        const today = new Date().toISOString().split('T')[0];
        return userHistory.some(r => r.date === today);
      }, [userHistory]);

      const stats = useMemo(() => {
        const total = members.length;
        const done = todayAllReports.length;
        const percent = total > 0 ? Math.round((done / total) * 100) : 0;
        
        const today = new Date();
        let targetDate = new Date(today.getFullYear(), 4, 17);
        if (today > targetDate) targetDate.setFullYear(today.getFullYear() + 1);
        
        const diffTime = Math.abs(targetDate - today);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        return { percent, diffDays, total, done };
      }, [members, todayAllReports]);

      const rankingList = useMemo(() => {
        const data = {};
        reports.forEach(r => {
          if (!data[r.userName]) data[r.userName] = new Set();
          data[r.userName].add(r.date);
        });
        
        const entries = Object.entries(data).map(([name, dates]) => {
          const count = dates.size;
          let title = "";
          if (count >= 30) title = ACHIEVEMENTS[30].title;
          else if (count >= 20) title = ACHIEVEMENTS[20].title;
          else if (count >= 10) title = ACHIEVEMENTS[10].title;
          return { name, count, title };
        });
        
        return entries.sort((a, b) => b.count - a.count);
      }, [reports]);
