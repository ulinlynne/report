<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可愛運動回報系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
  {"imports": {"react": "https://esm.sh/react@18.2.0", "react-dom/client": "https://esm.sh/react-dom@18.2.0/client", "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0", "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js", "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"}}
  </script>
  <style>.animate-in{animation:fadeIn 0.6s ease-out forwards}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}</style>
</head>
<body class="bg-[#FFF5F7]">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React,{useState,useEffect,useMemo} from 'react';
    import {createRoot} from 'react-dom/client';
    import {initializeApp} from 'firebase/app';
    import {getAuth,signInAnonymously,onAuthStateChanged} from 'firebase/auth';
    import {getFirestore,collection,doc,setDoc,getDoc,addDoc,deleteDoc,onSnapshot,updateDoc} from 'firebase/firestore';
    import {Heart,Dumbbell,Calendar,LogOut,CheckCircle2,Trophy,Sparkles,User,ArrowRight,History,Clock,Plus,Trash2,Edit2,X,Save,Flag,Zap,CalendarCheck,ChevronDown,ChevronUp,Medal,Star,Crown,PartyPopper,PlayCircle,BookOpen} from 'lucide-react';

    const firebaseConfig={apiKey:"AIzaSyBNIFEJdJ6Ezi1HiNiCO5nRjcdKwxwTG0k",authDomain:"report-67a9c.firebaseapp.com",projectId:"report-67a9c",storageBucket:"report-67a9c.firebasestorage.app",messagingSenderId:"633143727143",appId:"1:633143727143:web:743ab5443e72cfc7966a02"};
    const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);const appId='cute-fitness-system-v5';
    const ACHIEVEMENTS={10:{title:"初萌小仙芽",color:"from-green-300 to-teal-400",icon:<Sparkles className="text-white"/>},20:{title:"霓裳輕盈仙子",color:"from-purple-400 to-pink-500",icon:<Medal className="text-white"/>},30:{title:"凌波閃耀上仙",color:"from-blue-400 to-indigo-500",icon:<Star className="text-white" fill="white"/>}};
    const getAch=(d)=>{if(d>=30)return ACHIEVEMENTS[30];if(d>=20)return ACHIEVEMENTS[20];if(d>=10)return ACHIEVEMENTS[10];return null;};

    function App(){
      const [user,setUser]=useState(null);const [sessionUser,setSessionUser]=useState(null);const [isAdmin,setIsAdmin]=useState(false);
      const [reports,setReports]=useState([]);const [members,setMembers]=useState([]);const [menus,setMenus]=useState([]);
      const [loading,setLoading]=useState(true);const [msg,setMsg]=useState(null);
      const [showBoard,setShowBoard]=useState(false);const [unlocked,setUnlocked]=useState(null);

      useEffect(()=>{
        signInAnonymously(auth).catch(e=>console.error(e));
        const unsub=onAuthStateChanged(auth,(u)=>{setUser(u);setLoading(false);});
        return ()=>unsub();
      },[]);

      useEffect(()=>{
        if(!user)return;
        const u1=onSnapshot(collection(db,'artifacts',appId,'public','data','reports'),(s)=>setReports(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u2=onSnapshot(collection(db,'artifacts',appId,'public','data','members'),(s)=>setMembers(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u3=onSnapshot(collection(db,'artifacts',appId,'public','data','menus'),(s)=>setMenus(s.docs.map(d=>({id:d.id,...d.data()}))));
        return ()=>{u1();u2();u3();};
      },[user]);

      const showM=(m)=>{setMsg(m);setTimeout(()=>setMsg(null),3000);};

      const login=async(name)=>{
        const n=name.trim();if(!n)return showM("名字不能空喔🌸");
        setLoading(true);
        if(n.toLowerCase()==='admin'){setIsAdmin(true);setSessionUser('管理員');}
        else{
          try{
            const r=doc(db,'artifacts',appId,'public','data','members',n);
            const s=await getDoc(r);
            if(!s.exists())await setDoc(r,{name:n,createdAt:new Date().toISOString()});
            setIsAdmin(false);setSessionUser(n);
          }catch(e){}
        }
        setLoading(false);showM(`歡迎回來，${n} ✨`);
      };

      const logout=()=>{setSessionUser(null);setIsAdmin(false);showM("明天也要加油喔！🌸");};

      const submitR=async()=>{
        if(!user||!sessionUser)return;
        const t=new Date().toISOString().split('T')[0];
        if(reports.some(r=>r.userName===sessionUser&&r.date===t))return showM("今天打過卡囉！🌸");
        try{
          const c=new Set(reports.filter(r=>r.userName===sessionUser).map(r=>r.date)).size;
          await addDoc(collection(db,'artifacts',appId,'public','data','reports'),{userName:sessionUser,userId:user.uid,date:t,timestamp:new Date().toISOString()});
          showM("打卡成功！🎊");
          if(ACHIEVEMENTS[c+1])setUnlocked({day:c+1,...ACHIEVEMENTS[c+1]});
        }catch(e){showM("打卡失敗🌸");}
      };

      // Admin funcs
      const addM=async(n)=>{n=n.trim();if(n)try{await setDoc(doc(db,'artifacts',appId,'public','data','members',n),{name:n});showM("新增成功");}catch(e){showM("失敗");}};
      const delM=async(id)=>{setLoading(true);try{
        const ur=reports.filter(r=>r.userName===id);
        for(const r of ur)await deleteDoc(doc(db,'artifacts',appId,'public','data','reports',r.id));
        await deleteDoc(doc(db,'artifacts',appId,'public','data','members',id));
        showM("已刪除");}catch(e){showM("失敗");}setLoading(false);};
      const updM=async(oid,nn)=>{nn=nn.trim();if(!nn||oid===nn)return;setLoading(true);try{
        const or=reports.filter(r=>r.userName===oid);
        for(const r of or)await updateDoc(doc(db,'artifacts',appId,'public','data','reports',r.id),{userName:nn});
        await setDoc(doc(db,'artifacts',appId,'public','data','members',nn),{name:nn});
        await deleteDoc(doc(db,'artifacts',appId,'public','data','members',oid));
        showM("更新成功");}catch(e){showM("失敗");}setLoading(false);};
      const delR=async(id)=>{try{await deleteDoc(doc(db,'artifacts',appId,'public','data','reports',id));showM("已刪除");}catch(e){showM("失敗");}};
      const manR=async(n,d)=>{if(n&&d)try{await addDoc(collection(db,'artifacts',appId,'public','data','reports'),{userName:n,userId:"admin",date:d,timestamp:new Date().toISOString()});showM("補打卡成功");}catch(e){showM("失敗");}};
      const saveMnu=async(d,c,v)=>{if(d&&c.trim())try{await setDoc(doc(db,'artifacts',appId,'public','data','menus',d),{content:c.trim(),videoUrl:v.trim()});showM("菜單已發布");}catch(e){showM("失敗");}};
      const delMnu=async(d)=>{try{await deleteDoc(doc(db,'artifacts',appId,'public','data','menus',d));showM("菜單已刪除");}catch(e){showM("失敗");}};

      const today=new Date().toISOString().split('T')[0];
      const todayR=useMemo(()=>reports.filter(r=>r.date===today),[reports,today]);
      const todayMnu=useMemo(()=>menus.find(m=>m.id===today),[menus,today]);
      
      const stats=useMemo(()=>{
        const t=members.length;const d=todayR.length;
        const pct=t>0?Math.round((d/t)*100):0;
        const nw=new Date();let tgt=new Date(nw.getFullYear(),4,17);
        if(nw>tgt)tgt.setFullYear(nw.getFullYear()+1);
        const df=Math.ceil((tgt-nw)/(1000*60*60*24));
        return {pct,df,t,d};
      },[members,todayR]);

      const rank=useMemo(()=>{
        const c={};reports.forEach(r=>{if(!c[r.userName])c[r.userName]=new Set();c[r.userName].add(r.date);});
        return Object.entries(c).map(([name,s])=>({name,count:s.size})).sort((a,b)=>b.count-a.count);
      },[reports]);

      if(loading)return <div className="min-h-screen bg-[#FFF5F7] flex items-center justify-center text-pink-400"><div className="animate-bounce flex flex-col items-center gap-4"><Heart size={48} fill="currentColor" /><span className="font-black text-pink-300">系統處理中...</span></div></div>;

      return (
        <div className="min-h-screen bg-[#FFF5F7] text-gray-700 font-sans pb-20">
          <header className="bg-white/90 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50">
            <div className="max-w-md mx-auto flex justify-between items-center">
              <div className="flex items-center gap-2"><div className="bg-pink-100 p-2 rounded-2xl text-pink-500"><Dumbbell size={22}/></div><h1 className="text-xl font-black text-pink-600">體能小仙女</h1></div>
              <div className="flex items-center gap-2">
                <button onClick={()=>setShowBoard(true)} className="bg-yellow-100 p-2.5 rounded-full text-yellow-600 hover:scale-105 transition-transform"><Trophy size={20}/></button>
                {sessionUser && <button onClick={logout} className="flex items-center gap-1 text-gray-400 text-xs font-black bg-gray-50 px-3 py-2 rounded-full hover:bg-rose-50 hover:text-rose-400"><LogOut size={14}/> 登出</button>}
              </div>
            </div>
          </header>

          <main className="max-w-md mx-auto p-4 space-y-6">
            {msg && <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-white/95 border-2 border-pink-200 px-6 py-3 rounded-full shadow-2xl z-[60] animate-in fade-in"><span className="text-pink-500 font-black">{msg}</span></div>}

            <div className="bg-white p-5 rounded-[32px] shadow-sm border border-pink-50 space-y-4">
              <div className="flex justify-between items-center"><div className="flex items-center gap-2"><div className="bg-yellow-100 p-1.5 rounded-lg text-yellow-500"><Zap size={16} fill="currentColor"/></div><span className="text-xs font-black text-gray-600">今日達成</span></div><span className="text-sm font-black text-pink-500">{stats.pct}%</span></div>
              <div className="h-4 bg-gray-50 rounded-full overflow-hidden border border-gray-100"><div className="h-full bg-gradient-to-r from-pink-300 via-rose-400 to-pink-500 transition-all duration-1000" style={{width:stats.pct+'%'}}/></div>
              <div className="flex justify-between text-[10px] text-gray-400 font-black tracking-widest uppercase"><span>打卡:{stats.d}/{stats.t}</span><span className="text-pink-300">每一分努力都值得🌸</span></div>
            </div>

            {!sessionUser?<LoginV onLogin={login} todayR={todayR} members={members} df={stats.df}/>:isAdmin?<AdminV reports={reports} members={members} menus={menus} onAdd={addM} onDel={delM} onUpd={updM} onDelR={delR} onMan={manR} onSave={saveMnu} onDelMnu={delMnu}/>:<UserV name={sessionUser} history={reports.filter(r=>r.userName===sessionUser).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))} done={todayR.some(r=>r.userName===sessionUser)} onSub={submitR} df={stats.df} menu={todayMnu}/>}
          </main>

          {showBoard && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-in fade-in">
              <div className="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden">
                <div className="bg-gradient-to-br from-yellow-400 via-orange-400 to-rose-400 p-8 text-white text-center relative">
                  <button onClick={()=>setShowBoard(false)} className="absolute top-6 right-6 bg-white/20 p-2 rounded-full"><X size={20}/></button>
                  <Trophy size={56} className="mx-auto mb-3" fill="currentColor"/><h2 className="text-3xl font-black">勤奮仙女榜</h2><p className="text-xs opacity-90 font-bold">汗水都在閃耀✨</p>
                </div>
                <div className="max-h-[50vh] overflow-y-auto p-6 space-y-3">
                  {rank.length===0?<div className="text-center text-gray-400 py-4 text-sm">還沒人上榜喔！</div>:
                    rank.map((item,idx)=>{
                      const ach=getAch(item.count);
                      return <div key={idx} className="flex justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div className="flex items-center gap-4"><div className="w-8 flex justify-center text-lg font-black italic">{idx===0?<Crown className="text-yellow-500"/>:idx===1?<Medal className="text-gray-400"/>:idx===2?<Medal className="text-orange-500"/>:idx+1}</div>
                        <div className="flex flex-col"><span className="font-black text-gray-700 text-lg">{item.name}</span>{ach&&<div className={`mt-0.5 text-[9px] font-black px-1.5 py-0.5 rounded bg-gradient-to-r ${ach.color} text-white w-fit`}>{ach.title}</div>}</div></div>
                        <div className="text-right"><div className="text-2xl font-black text-yellow-600 leading-none">{item.count}</div><div className="text-[10px] text-gray-400 font-black mt-1 uppercase">Days</div></div>
                      </div>
                  })}
                </div>
                <div className="p-6 bg-gray-50"><button onClick={()=>setShowBoard(false)} className="w-full bg-white text-gray-500 py-4 rounded-3xl font-black text-sm shadow-sm border border-gray-200 active:scale-95">返回系統</button></div>
              </div>
            </div>
          )}
          {unlocked && (
            <div className="fixed inset-0 bg-pink-500/90 backdrop-blur-xl z-[200] flex items-center justify-center p-8 animate-in fade-in">
              <div className="bg-white rounded-[48px] w-full max-w-sm p-10 text-center space-y-6 shadow-2xl">
                <div className={`w-28 h-28 rounded-[40px] bg-gradient-to-br ${unlocked.color} flex items-center justify-center shadow-2xl rotate-12 scale-110 mb-6 mx-auto`}>{React.cloneElement(unlocked.icon,{size:56})}</div>
                <div className="space-y-3"><h3 className="text-gray-400 text-sm font-black uppercase tracking-widest">Level Up!</h3><h2 className="text-4xl font-black text-gray-800 tracking-tighter">{unlocked.title}</h2><p className="text-pink-500 font-bold text-lg">打卡 <span className="text-3xl">{unlocked.day}</span> 天 ✨</p></div>
                <button onClick={()=>setUnlocked(null)} className={`w-full bg-gradient-to-r ${unlocked.color} text-white py-5 rounded-[24px] font-black text-xl shadow-lg active:scale-95`}>收下榮耀💖</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function LoginV({onLogin,todayR,members,df}){
      const [n,setN]=useState('');
      const done=todayR.map(r=>r.userName);const pend=members.filter(m=>!done.includes(m.name));
      return <div className="space-y-8 animate-in fade-in slide-in-from-bottom-6">
        <div className="text-center space-y-4"><img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=400&h=400&fit=crop" className="w-40 h-40 rounded-[40px] border-4 border-white shadow-2xl object-cover rotate-3 mx-auto" alt="logo"/><div className="space-y-1"><h2 className="text-3xl font-black text-gray-800 tracking-tighter">運動時間到囉！🌸</h2><p className="text-gray-400 text-sm font-bold">開啟閃耀運動計畫✨</p></div></div>
        <div className="space-y-4"><div className="relative"><User className="absolute left-5 top-1/2 -translate-y-1/2 text-pink-300" size={22}/><input type="text" value={n} onChange={e=>setN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onLogin(n)} placeholder="輸入名字" className="w-full pl-14 pr-6 py-5 rounded-[28px] border-2 border-pink-50 focus:border-pink-300 outline-none text-lg bg-white/50 backdrop-blur-sm"/></div><button onClick={()=>onLogin(n)} className="w-full bg-gradient-to-r from-pink-400 to-pink-500 text-white py-5 rounded-[28px] font-black text-xl shadow-xl active:scale-[0.98] flex items-center justify-center gap-3">進入系統<ArrowRight size={22}/></button></div>
        <div className="grid gap-6 pt-4"><div className="space-y-3"><h3 className="font-black text-green-500 text-xs flex items-center gap-2 px-2 uppercase tracking-widest"><CheckCircle2 size={16}/>今日達成({done.length})</h3><div className="flex flex-wrap gap-2 px-1">{done.length===0?<p className="text-[10px] text-gray-300 font-bold italic">還沒有人打卡喔🌿</p>:done.map((d,i)=><button key={i} onClick={()=>onLogin(d)} className="bg-green-50 text-green-600 px-4 py-2 rounded-2xl font-black text-xs border border-green-100 shadow-sm">{d}</button>)}</div></div>
        <div className="space-y-3"><h3 className="font-black text-rose-300 text-xs flex items-center gap-2 px-2 uppercase tracking-widest"><Clock size={16}/>等妳來打卡({pend.length})</h3><div className="flex flex-wrap gap-2 px-1">{pend.length===0&&members.length>0?<div className="w-full p-6 bg-rose-50 rounded-[32px] border border-dashed border-rose-200 text-center"><PartyPopper className="mx-auto mb-2 text-rose-400" size={24}/><p className="text-sm text-rose-500 font-black italic">全員達成目標💖</p></div>:pend.map((p,i)=><button key={i} onClick={()=>onLogin(p.name)} className="bg-white text-gray-400 px-4 py-2 rounded-2xl font-bold text-xs border border-pink-50 shadow-sm hover:border-pink-200">{p.name}</button>)}</div></div></div>
        <div className="bg-white p-5 rounded-[32px] shadow-sm border border-pink-50 flex items-center justify-between"><div className="flex items-center gap-4"><div className="bg-rose-100 p-3 rounded-2xl text-rose-500"><Flag size={20}/></div><div><div className="text-[10px] text-gray-400 font-black uppercase tracking-widest">距離5/17目標</div><div className="text-xl font-black text-gray-800 tracking-tighter">還有 <span className="text-rose-500 text-2xl">{df}</span> 天</div></div></div><div className="bg-pink-50 px-3 py-1.5 rounded-full text-[10px] font-black text-pink-400 animate-pulse">加油姊妹們！</div></div>
      </div>;
    }

    function UserV({name,history,done,onSub,df,menu}){
      const total=new Set(history.map(r=>r.date)).size;const ach=getAch(total);
      return <div className="space-y-6 animate-in slide-in-from-bottom-8">
        {menu && <div className="bg-gradient-to-br from-pink-400 to-rose-500 rounded-[32px] p-6 shadow-xl text-white space-y-4 relative overflow-hidden"><div className="absolute top-[-10px] right-[-10px] opacity-20 rotate-12"><BookOpen size={80}/></div><div className="flex items-center gap-3 relative z-10"><div className="bg-white/20 p-2 rounded-xl"><Sparkles size={20} className="text-white"/></div><h3 className="font-black tracking-widest text-lg">今日小仙女菜單🥗</h3></div><div className="bg-white/10 backdrop-blur-sm rounded-2xl p-4 border border-white/20 relative z-10"><p className="whitespace-pre-wrap font-medium leading-relaxed text-sm">{menu.content}</p></div>{menu.videoUrl&&<a href={menu.videoUrl} target="_blank" rel="noreferrer" className="flex justify-center gap-2 py-3 bg-white text-rose-500 rounded-xl font-black text-sm shadow-md hover:bg-rose-50 relative z-10"><PlayCircle size={18}/> 觀看教學影片</a>}</div>}
        <div className="bg-white rounded-[40px] p-8 shadow-xl border border-pink-50 text-center space-y-6 relative overflow-hidden"><div className="absolute -top-10 -right-10 w-32 h-32 bg-pink-50 rounded-full blur-2xl opacity-60"/><div className="w-20 h-20 bg-pink-100 rounded-3xl flex items-center justify-center text-pink-500 mx-auto"><User size={40}/></div><div className="space-y-3"><div className="flex flex-col items-center"><h2 className="text-2xl font-black tracking-tighter">{name} 小仙女🍓</h2>{ach&&<div className={`mt-2 flex items-center gap-1.5 px-3 py-1 rounded-full bg-gradient-to-r ${ach.color} shadow-sm`}><span className="text-[10px] font-black text-white uppercase">{ach.title}</span></div>}</div><p className="text-sm font-bold text-gray-400">已累計打卡：<span className="text-pink-500 text-2xl">{total}</span> 天</p></div><div className="py-3 bg-rose-50 rounded-[20px] flex justify-center gap-2 animate-pulse"><Flag size={16} className="text-rose-400"/><p className="text-sm text-rose-500 font-black">距離5/17還有 <span className="text-xl">{df}</span> 天✨</p></div>{done?<div className="bg-green-50 text-green-600 py-5 rounded-[24px] font-black flex justify-center gap-3"><CheckCircle2 size={24}/> 今日已達成！</div>:<button onClick={onSub} className="w-full bg-gradient-to-br from-pink-400 to-rose-500 text-white py-6 rounded-[24px] font-black text-xl shadow-xl active:scale-95">一鍵報備：我運動完了！✨</button>}</div>
        <div className="space-y-4"><h3 className="font-black text-gray-800 text-lg flex items-center gap-2 px-2"><History size={24} className="text-pink-400"/> 努力紀錄({history.length})</h3><div className="space-y-3">{history.length===0?<div className="p-12 text-center text-gray-300 font-bold bg-white rounded-[32px] border border-dashed border-pink-100 italic">還沒有紀錄喔！</div>:history.map((r,i)=><div key={i} className="bg-white p-5 rounded-[24px] border border-pink-50 shadow-sm flex justify-between items-center"><div className="flex gap-4"><div className="bg-pink-50 p-2.5 rounded-2xl text-pink-400"><Calendar size={20}/></div><div><div className="font-black text-gray-800 text-lg">{r.date}</div><div className="text-[10px] text-green-500 font-black uppercase tracking-widest">Completed ✨</div></div></div><Heart size={20} className="text-pink-200" fill={i===0?"#f9a8d4":"none"}/></div>)}</div></div>
      </div>;
    }

    function AdminV({reports,members,menus,onAdd,onDel,onUpd,onDelR,onMan,onSave,onDelMnu}){
      const [tab,setTab]=useState('records');const [nName,setNN]=useState('');const [editM,setEdit]=useState(null);
      const [mDate,setMD]=useState(new Date().toISOString().split('T')[0]);const [mCon,setMC]=useState('');const [mVid,setMV]=useState('');
      useEffect(()=>{const e=menus.find(x=>x.id===mDate);if(e){setMC(e.content);setMV(e.videoUrl||'');}else{setMC('');setMV('');}},[mDate,menus]);
      const [exp,setExp]=useState({[new Date().toISOString().split('T')[0]]:true});
      const [manN,setMN]=useState('');const [manD,setMD2]=useState(new Date().toISOString().split('T')[0]);
      const [delId,setDelId]=useState(null);const [delMId,setDelMId]=useState(null);

      const rByD=useMemo(()=>{
        const g={};reports.forEach(r=>{if(!g[r.date])g[r.date]=[];g[r.date].push(r);});
        return Object.keys(g).sort((a,b)=>b.localeCompare(a)).map(d=>({date:d,rec:g[d],c:g[d].length,p:members.length>0?Math.round((g[d].length/members.length)*100):0}));
      },[reports,members]);

      return <div className="space-y-6 animate-in fade-in">
        <div className="flex bg-white p-1.5 rounded-[24px] border border-pink-100 shadow-sm"><button onClick={()=>setTab('records')} className={`flex-1 py-3 rounded-[18px] font-black text-sm ${tab==='records'?'bg-pink-400 text-white shadow-lg':'text-gray-400'}`}>紀錄</button><button onClick={()=>setTab('members')} className={`flex-1 py-3 rounded-[18px] font-black text-sm ${tab==='members'?'bg-pink-400 text-white shadow-lg':'text-gray-400'}`}>成員</button><button onClick={()=>setTab('menus')} className={`flex-1 py-3 rounded-[18px] font-black text-sm ${tab==='menus'?'bg-pink-400 text-white shadow-lg':'text-gray-400'}`}>菜單</button></div>
        {tab==='records'?<div className="space-y-6"><div className="bg-white p-6 rounded-[32px] border border-pink-100 space-y-4 shadow-sm"><h3 className="font-black text-pink-600 flex items-center gap-2"><CalendarCheck size={18}/>補打卡</h3><div className="space-y-3"><select value={manN} onChange={e=>setMN(e.target.value)} className="w-full bg-pink-50 p-4 rounded-2xl outline-none font-bold"><option value="">選擇姊妹...</option>{members.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}</select><input type="date" value={manD} onChange={e=>setMD2(e.target.value)} className="w-full bg-pink-50 p-4 rounded-2xl outline-none font-bold"/><button onClick={()=>{onMan(manN,manD);setMN('');}} className="w-full bg-pink-400 text-white py-4 rounded-2xl font-black shadow-md">確認補打卡</button></div></div><div className="space-y-4">{rByD.map((g,i)=><div key={i} className="bg-white rounded-[32px] border border-pink-100 shadow-sm"><div onClick={()=>setExp(p=>({...p,[g.date]:!p[g.date]}))} className="bg-pink-50 p-5 flex justify-between items-center cursor-pointer"><div className="flex gap-3"><Calendar className="text-pink-400"/><span className="font-black text-pink-600">{g.date}</span></div><span className="text-[10px] font-black bg-white px-3 py-1.5 rounded-full text-pink-500">{g.c}人 ({g.p}%)</span></div>{exp[g.date]&&<div className="p-3 space-y-1">{g.rec.map((r,ri)=><div key={r.id||ri} className="flex justify-between p-4 hover:bg-pink-50/20 rounded-2xl"><span className="font-black text-gray-700">{r.userName}</span>{delId===r.id?<div className="flex gap-1"><button onClick={()=>{onDelR(r.id);setDelId(null);}} className="bg-rose-500 text-white px-3 py-2 rounded-xl text-[10px] font-black">確定刪除</button><button onClick={()=>setDelId(null)} className="bg-gray-200 px-3 py-2 rounded-xl text-[10px] font-black">取消</button></div>:<div className="flex gap-2"><CheckCircle2 className="text-green-500" size={16}/><button onClick={()=>setDelId(r.id)} className="text-gray-300 hover:text-rose-400"><Trash2 size={16}/></button></div>}</div>)}</div>}</div>)}</div></div>:tab==='members'?<div className="space-y-6"><div className="bg-white p-4 rounded-3xl border border-pink-100 shadow-sm flex gap-3"><input type="text" value={nName} onChange={e=>setNN(e.target.value)} placeholder="新成員名字..." className="flex-1 bg-pink-50/50 px-5 py-3 rounded-2xl outline-none font-bold"/><button onClick={()=>{onAdd(nName);setNN('');}} className="bg-pink-400 text-white p-3.5 rounded-2xl"><Plus size={24}/></button></div><div className="bg-white rounded-[32px] border border-pink-100 divide-y divide-pink-50">{members.length===0?<div className="p-10 text-center text-gray-300 font-bold italic">無成員</div>:members.map(m=><div key={m.id} className="p-5 flex justify-between items-center">{editM?.id===m.id?<div className="flex-1 flex gap-2"><input value={editM.name} onChange={e=>setEdit({...editM,name:e.target.value})} className="flex-1 border-2 border-pink-200 px-4 py-2 rounded-xl font-black outline-none"/><button onClick={()=>{onUpd(m.id,editM.name);setEdit(null);}} className="bg-green-500 text-white p-2.5 rounded-xl"><Save size={18}/></button><button onClick={()=>setEdit(null)} className="bg-gray-200 p-2.5 rounded-xl"><X size={18}/></button></div>:<><div className="flex gap-3 items-center"><div className="w-2 h-2 rounded-full bg-pink-300"/><span className="font-black text-gray-700 text-lg">{m.name}</span></div>{delMId===m.id?<div className="flex gap-1"><button onClick={()=>{onDel(m.id);setDelMId(null);}} className="bg-rose-500 text-white px-3 py-2 rounded-xl text-[10px] font-black">確定刪除</button><button onClick={()=>setDelMId(null)} className="bg-gray-200 px-3 py-2 rounded-xl text-[10px] font-black">取消</button></div>:<div className="flex gap-2"><button onClick={()=>setEdit({id:m.id,name:m.name})} className="p-2.5 text-blue-400 bg-blue-50 rounded-xl"><Edit2 size={16}/></button><button onClick={()=>setDelMId(m.id)} className="p-2.5 text-rose-400 bg-rose-50 rounded-xl"><Trash2 size={16}/></button></div>}</>}</div>)}</div></div>:<div className="space-y-6"><div className="bg-white p-6 rounded-[32px] border border-pink-100 shadow-sm space-y-4"><h3 className="font-black text-pink-600 flex gap-2"><BookOpen size={18}/>編輯菜單</h3><div className="space-y-4"><input type="date" value={mDate} onChange={e=>setMD(e.target.value)} className="w-full bg-pink-50 p-4 rounded-2xl outline-none font-bold"/><textarea value={mCon} onChange={e=>setMC(e.target.value)} placeholder="菜單內容..." className="w-full bg-pink-50 p-4 rounded-2xl outline-none font-bold h-40 resize-none"/><input type="url" value={mVid} onChange={e=>setMV(e.target.value)} placeholder="影片網址(選填)" className="w-full bg-pink-50 p-4 rounded-2xl outline-none font-bold"/><div className="flex gap-2"><button onClick={()=>onSave(mDate,mCon,mVid)} className="flex-1 bg-pink-400 text-white py-4 rounded-2xl font-black">儲存</button>{menus.find(x=>x.id===mDate)&&<button onClick={()=>onDelMnu(mDate)} className="px-4 bg-rose-100 text-rose-500 rounded-2xl"><Trash2 size={20}/></button>}</div></div></div><div className="px-4"><h4 className="text-xs font-black text-gray-400 mb-3">最近菜單</h4><div className="space-y-2">{menus.sort((a,b)=>b.id.localeCompare(a.id)).slice(0,5).map(m=><div key={m.id} onClick={()=>setMD(m.id)} className="bg-white p-4 rounded-2xl border border-pink-50 flex justify-between cursor-pointer"><span className="font-bold text-sm">{m.id}</span>{m.videoUrl&&<PlayCircle size={14} className="text-rose-400"/>}</div>)}</div></div></div>}
        </div>;
      }

      const root=createRoot(document.getElementById('root'));root.render(<App/>);
    </script>
  </body>
</html>
