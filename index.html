<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可愛運動回報系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
    }
  }
  </script>

  <style>
    .animate-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#FFF5F7]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Heart, Dumbbell, Calendar, LogOut, CheckCircle2, Trophy, ClipboardList, 
      Sparkles, User, ArrowRight, History, Users, Clock, Plus, Trash2, Edit2, 
      X, Save, Flag, Zap, CalendarCheck, ChevronDown, ChevronUp, Medal, Star, 
      Crown, PartyPopper
    } from 'lucide-react';

    const ACHIEVEMENTS = {
      10: { title: "初萌小仙芽", color: "from-green-300 to-teal-400", icon: <Sparkles className="text-white" /> },
      20: { title: "霓裳輕盈仙子", color: "from-purple-400 to-pink-500", icon: <Medal className="text-white" /> },
      30: { title: "凌波閃耀上仙", color: "from-blue-400 to-indigo-500", icon: <Star className="text-white" fill="white" /> }
    };

    function App() {
      const [sessionUser, setSessionUser] = useState(() => localStorage.getItem('fitness_user'));
      const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('fitness_user') === '管理員');
      const [members, setMembers] = useState(() => JSON.parse(localStorage.getItem('fitness_members') || '[]'));
      const [reports, setReports] = useState(() => JSON.parse(localStorage.getItem('fitness_reports') || '[]'));
      
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);
      const [showLeaderboard, setShowLeaderboard] = useState(false);
      const [unlockedAchievement, setUnlockedAchievement] = useState(null);

      useEffect(() => { localStorage.setItem('fitness_members', JSON.stringify(members)); }, [members]);
      useEffect(() => { localStorage.setItem('fitness_reports', JSON.stringify(reports)); }, [reports]);
      useEffect(() => { 
        if (sessionUser) localStorage.setItem('fitness_user', sessionUser);
        else localStorage.removeItem('fitness_user');
      }, [sessionUser]);

      const showMessage = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(null), 3000);
      };

      const handleLogin = (name) => {
        const trimmedName = name.trim();
        if (!trimmedName) { showMessage("名字不能空空的喔 🌸"); return; }

        setLoading(true);
        const isAdm = trimmedName.toLowerCase() === 'admin';
        
        if (!isAdm && !members.find(m => m.name === trimmedName)) {
          setMembers(prev => [...prev, { id: Date.now().toString(), name: trimmedName, createdAt: new Date().toISOString() }]);
        }

        setTimeout(() => {
          if (isAdm) { setIsAdmin(true); setSessionUser('管理員'); } 
          else { setIsAdmin(false); setSessionUser(trimmedName); }
          setLoading(false);
          showMessage(`歡迎回來，${trimmedName} ✨`);
        }, 500);
      };

      const handleLogout = () => {
        setLoading(true);
        setTimeout(() => {
          setSessionUser(null); setIsAdmin(false); setLoading(false);
          showMessage("登出成功，明天也要加油喔！🌸");
        }, 500);
      };

      const submitReport = () => {
        if (!sessionUser) return;
        const today = new Date().toISOString().split('T')[0];
        const currentDays = new Set(reports.
