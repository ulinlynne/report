<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可愛運動回報系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
    }
  }
  </script>

  <style>
    /* 自訂基礎動畫以取代部分 Tailwind 擴充套件的動畫效果 */
    .animate-in {
      animation: fadeIn 0.6s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#FFF5F7]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, 
      signInAnonymously, 
      signInWithCustomToken,
      onAuthStateChanged,
      signOut
    } from 'firebase/auth';
    import { 
      getFirestore, 
      collection, 
      doc, 
      setDoc, 
      getDoc, 
      addDoc, 
      deleteDoc,
      onSnapshot,
      query
    } from 'firebase/firestore';
    import { 
      Heart, Dumbbell, Calendar, LogOut, CheckCircle2, Trophy, ClipboardList, 
      Sparkles, User, ArrowRight, History, Users, Clock, Plus, Trash2, Edit2, 
      X, Save, Flag, Zap, CalendarCheck, ChevronDown, ChevronUp
    } from 'lucide-react';

    // --- Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyBNIFEJdJ6Ezi1HiNiCO5nRjcdKwxwTG0k",
      authDomain: "report-67a9c.firebaseapp.com",
      projectId: "report-67a9c",
      storageBucket: "report-67a9c.firebasestorage.app",
      messagingSenderId: "633143727143",
      appId: "1:633143727143:web:743ab5443e72cfc7966a02"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'cute-fitness-system-v4';

    function App() {
      const [user, setUser] = useState(null); // Firebase Auth User
      const [sessionUser, setSessionUser] = useState(null); // 目前登入的名字
      const [isAdmin, setIsAdmin] = useState(false);
      const [reports, setReports] = useState([]);
      const [members, setMembers] = useState([]); // 所有成員
      const [loading, setLoading] = useState(true);
      const [message, setMessage] = useState(null);

      // --- 初始化 Auth ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth initialization failed:", err);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // --- 監聽資料庫資料 ---
      useEffect(() => {
        if (!user) return;

        const reportsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
        const unsubReports = onSnapshot(reportsRef, 
          (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setReports(data);
          }, 
          (err) => console.error("Reports fetch error:", err)
        );

        const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const unsubMembers = onSnapshot(membersRef,
          (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setMembers(data);
          },
          (err) => console.error("Members fetch error:", err)
        );

        return () => {
          unsubReports();
          unsubMembers();
        };
      }, [user]);

      // --- 動作處理 ---
      const handleLogin = async (name) => {
        const trimmedName = name.trim();
        if (!trimmedName) {
          showMessage("名字不能空空的喔 🌸");
          return;
        }

        setLoading(true);
        if (trimmedName.toLowerCase() !== 'admin') {
          try {
            const memberRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', trimmedName);
            const memberSnap = await getDoc(memberRef);
            if (!memberSnap.exists()) {
              await setDoc(memberRef, { 
                name: trimmedName, 
                createdAt: new Date().toISOString() 
              });
            }
          } catch (err) {
            console.error("Member registration error:", err);
          }
        }

        setTimeout(() => {
          if (trimmedName.toLowerCase() === 'admin') {
            setIsAdmin(true);
            setSessionUser('管理員');
          } else {
            setIsAdmin(false);
            setSessionUser(trimmedName);
          }
          setLoading(false);
          showMessage(`歡迎回來，${trimmedName} ✨`);
        }, 500);
      };

      const handleLogout = async () => {
        setLoading(true);
        setSessionUser(null);
        setIsAdmin(false);
        setTimeout(() => {
          setLoading(false);
          showMessage("登出成功，明天也要加油喔！🌸");
        }, 500);
      };

      const submitReport = async () => {
        if (!user) {
          showMessage("尚未連線，請稍候 🌸");
          return;
        }

        try {
          const today = new Date().toISOString().split('T')[0];
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
            userName: sessionUser,
            userId: user.uid,
            date: today,
            timestamp: new Date().toISOString(),
            status: 'completed'
          });
          showMessage("回報成功！妳真的太棒了 🎊");
        } catch (err) {
          showMessage("回報失敗 🌸");
        }
      };

      const showMessage = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(null), 3000);
      };

      // --- 管理員專屬操作 ---
      const adminAddMember = async (name) => {
        if (!name.trim()) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', name.trim()), {
            name: name.trim(),
            createdAt: new Date().toISOString()
          });
          showMessage(`已新增成員：${name} 🌸`);
        } catch (err) {
          showMessage("新增失敗 🌸");
        }
      };

      const adminDeleteMember = async (name) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', name));
          showMessage(`已刪除成員：${name} 🌸`);
        } catch (err) {
          showMessage("刪除失敗 🌸");
        }
      };

      const adminManualReport = async (memberName, reportDate) => {
        if (!user) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
            userName: memberName,
            userId: "admin-manual", 
            date: reportDate,
            timestamp: new Date().toISOString(),
            status: 'completed'
          });
          showMessage(`已幫 ${memberName} 補打卡 (${reportDate}) 🌸`);
        } catch (err) {
          console.error(err);
          showMessage("補打卡失敗 🌸");
        }
      };

      // --- 資料篩選與計算 ---
      const todayAllReports = useMemo(() => {
        const today = new Date().toISOString().split('T')[0];
        return reports.filter(r => r.date === today);
      }, [reports]);

      const userHistory = useMemo(() => {
        return reports
          .filter(r => r.userName === sessionUser)
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      }, [reports, sessionUser]);

      const hasReportedToday = useMemo(() => {
        const today = new Date().toISOString().split('T')[0];
        return userHistory.some(r => r.date === today);
      }, [userHistory]);

      const stats = useMemo(() => {
        const total = members.length;
        const done = todayAllReports.length;
        const percent = total > 0 ? Math.round((done / total) * 100) : 0;
        
        const today = new Date();
        let targetDate = new Date(today.getFullYear(), 4, 17); // 5/17
        if (today > targetDate) {
          targetDate.setFullYear(today.getFullYear() + 1);
        }
        const diffTime = Math.abs(targetDate - today);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        return { percent, diffDays, total, done };
      }, [members, todayAllReports]);

      if (loading) {
        return (
          <div className="min-h-screen bg-[#FFF5F7] flex items-center justify-center">
            <div className="text-pink-400 animate-bounce flex flex-col items-center gap-4">
              <Heart size={48} fill="currentColor" />
              <span className="text-pink-300 font-medium">系統載入中...</span>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#FFF5F7] text-gray-700 font-sans pb-20">
          <header className="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50 shadow-sm">
            <div className="max-w-md mx-auto flex justify-between items-center">
              <div className="flex items-center gap-2">
                <div className="bg-pink-100 p-2 rounded-xl text-pink-500 shadow-inner">
                  <Dumbbell size={20} />
                </div>
                <h1 className="text-xl font-black text-pink-600 tracking-wider">體能小仙女</h1>
              </div>
              {sessionUser && (
                <button 
                  onClick={handleLogout} 
                  className="flex items-center gap-1 text-gray-400 hover:text-rose-500 transition-colors text-sm font-bold bg-gray-50 px-3 py-1.5 rounded-full"
                >
                  <LogOut size={16} />
                  登出
                </button>
              )}
            </div>
          </header>

          <main className="max-w-md mx-auto p-4 space-y-6">
            {message && (
              <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-white border-2 border-pink-200 px-6 py-3 rounded-full shadow-xl z-[60] animate-in fade-in slide-in-from-top-4">
                <span className="text-pink-500 font-bold">{message}</span>
              </div>
            )}

            <div className="bg-white p-4 rounded-[24px] shadow-sm border border-pink-50 space-y-3 animate-in fade-in slide-in-from-top-4 duration-500">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="bg-yellow-100 p-1.5 rounded-lg text-yellow-500">
                    <Zap size={16} fill="currentColor" />
                  </div>
                  <span className="text-xs font-black text-gray-600">今日達成比例</span>
                </div>
                <span className="text-sm font-black text-pink-500">{stats.percent}%</span>
              </div>
              <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-gradient-to-r from-pink-300 to-rose-400 transition-all duration-1000 ease-out"
                  style={{ width: `${stats.percent}%` }}
                />
              </div>
              <div className="flex justify-between text-[10px] text-gray-400 font-medium">
                <span>已打卡: {stats.done} 人</span>
                <span>總成員: {stats.total} 人</span>
              </div>
            </div>

            {!sessionUser ? (
              <LoginView onLogin={handleLogin} todayReports={todayAllReports} allMembers={members} />
            ) : isAdmin ? (
              <AdminDashboard 
                reports={reports} 
                members={members} 
                onAddMember={adminAddMember}
                onDeleteMember={adminDeleteMember}
                onManualReport={adminManualReport}
                onBack={handleLogout} 
              />
            ) : (
              <UserDashboard 
                userName={sessionUser}
                history={userHistory}
                hasReportedToday={hasReportedToday}
                onSubmit={submitReport}
                todayReports={todayAllReports}
              />
            )}

            <div className="bg-white p-4 rounded-[24px] shadow-sm border border-pink-50 flex items-center justify-between mt-8 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-10">
              <div className="flex items-center gap-3">
                <div className="bg-rose-100 p-2 rounded-xl text-rose-500">
                  <Flag size={20} />
                </div>
                <div>
                  <div className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">距離 5/17 目標</div>
                  <div className="text-lg font-black text-gray-800">還有 <span className="text-rose-500">{stats.diffDays}</span> 天</div>
                </div>
              </div>
              <div className="bg-pink-50 px-3 py-1 rounded-full text-[10px] font-bold text-pink-400">加油姊妹們！</div>
            </div>
          </main>
        </div>
      );
    }

    // --- 分量子組件 ---

    function LoginView({ onLogin, todayReports, allMembers }) {
      const [name, setName] = useState('');
      const pendingMembers = useMemo(() => {
        const todayDoneNames = todayReports.map(r => r.userName);
        return allMembers.filter(m => !todayDoneNames.includes(m.name));
      }, [allMembers, todayReports]);

      return (
        <div className="flex flex-col items-center space-y-8 animate-in fade-in duration-700">
          <div className="relative pt-4">
            <div className="absolute top-0 -right-4 bg-yellow-300 p-2 rounded-full animate-pulse shadow-lg z-10">
              <Sparkles size={20} className="text-white" />
            </div>
            <img 
              src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=400&h=400&fit=crop" 
              className="w-40 h-40 rounded-[40px] border-4 border-white shadow-2xl object-cover rotate-3"
              alt="登入圖片"
            />
          </div>
          
          <div className="text-center space-y-2">
            <h2 className="text-2xl font-black text-gray-800 tracking-tight">運動時間到囉！🌸</h2>
            <p className="text-gray-400 text-sm px-4">輸入名字或點擊下方快捷鍵進入</p>
          </div>

          <div className="w-full space-y-4">
            <div className="relative">
              <User className="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300" size={20} />
              <input 
                type="text"
                value={name}
                onChange={(e) => setName(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && onLogin(name)}
                placeholder="妳的名字"
                className="w-full pl-12 pr-4 py-4 rounded-3xl border-2 border-pink-100 focus:border-pink-300 outline-none shadow-sm text-lg transition-all bg-white"
              />
            </div>
            <button 
              onClick={() => onLogin(name)}
              className="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white py-4 rounded-3xl font-black text-lg shadow-lg shadow-pink-200 hover:shadow-xl hover:-translate-y-1 active:translate-y-0 transition-all flex items-center justify-center gap-2"
            >
              進入系統 <ArrowRight size={20} />
            </button>
          </div>

          <div className="w-full space-y-6 pt-4 border-t border-pink-100">
            <div className="space-y-3">
              <h3 className="font-black text-green-600 flex items-center gap-2 px-2 text-xs uppercase tracking-wider">
                <CheckCircle2 size={16} className="text-green-500" />
                今日已達成姊妹 ({todayReports.length})
              </h3>
              <div className="flex flex-wrap gap-2 px-1">
                {todayReports.length === 0 ? (
                  <div className="text-gray-400 text-[10px] italic bg-white/40 px-3 py-2 rounded-xl border border-dashed border-gray-200 w-full text-center">
                    今天還沒有人打卡，快來搶第一個！
                  </div>
                ) : (
                  todayReports.map((report, idx) => (
                    <button 
                      key={idx} 
                      onClick={() => onLogin(report.userName)}
                      className="bg-white hover:bg-green-50 text-green-600 px-3 py-1.5 rounded-xl font-bold text-xs shadow-sm border border-green-50 flex items-center gap-1.5 transition-all active:scale-95"
                    >
                      <div className="w-4 h-4 bg-green-100 rounded-full flex items-center justify-center text-[8px]">
                        {report.userName?.[0]}
                      </div>
                      {report.userName}
                    </button>
                  ))
                )}
              </div>
            </div>

            <div className="space-y-3">
              <h3 className="font-black text-pink-400 flex items-center gap-2 px-2 text-xs uppercase tracking-wider">
                <Clock size={16} className="text-pink-300" />
                等妳來打卡 ({pendingMembers.length})
              </h3>
              <div className="flex flex-wrap gap-2 px-1">
                {pendingMembers.length === 0 && allMembers.length > 0 ? (
                  <div className="text-pink-500 text-[10px] font-bold bg-pink-50 px-3 py-2 rounded-xl w-full text-center border border-pink-100">
                    太棒了！全員打卡完成！🎊
                  </div>
                ) : pendingMembers.length === 0 ? (
                  <div className="text-gray-400 text-[10px] italic w-full text-center">尚未有成員加入</div>
                ) : (
                  pendingMembers.map((member, idx) => (
                    <button 
                      key={idx} 
                      onClick={() => onLogin(member.name)}
                      className="bg-white hover:bg-pink-50 text-gray-500 hover:text-pink-500 px-3 py-1.5 rounded-xl font-medium text-xs border border-pink-50 flex items-center gap-1.5 transition-all active:scale-95 shadow-sm"
                    >
                      <div className="w-4 h-4 bg-gray-100 group-hover:bg-pink-100 rounded-full flex items-center justify-center text-[8px]">
                        {member.name?.[0]}
                      </div>
                      {member.name}
                    </button>
                  ))
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function UserDashboard({ userName, history, hasReportedToday, onSubmit, todayReports }) {
      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div className="bg-white rounded-[32px] p-6 shadow-xl border border-pink-50 relative overflow-hidden">
            <div className="absolute top-[-20px] left-[-20px] w-24 h-24 bg-pink-50 rounded-full opacity-50" />
            <div className="relative z-10 flex flex-col items-center text-center space-y-4">
              <div className="w-16 h-16 bg-pink-100 rounded-2xl flex items-center justify-center text-pink-500 shadow-inner">
                <User size={32} />
              </div>
              <div>
                <h2 className="text-xl font-black text-gray-800">{userName} 小仙女 🍓</h2>
                <p className="text-gray-400 text-sm mt-1">今天累積 {todayReports.length} 人打卡！</p>
              </div>
              
              {hasReportedToday ? (
                <div className="bg-green-50 text-green-600 px-6 py-3 rounded-2xl border border-green-100 font-bold flex items-center gap-2">
                  <CheckCircle2 size={20} /> 今日已達成！
                </div>
              ) : (
                <button 
                  onClick={onSubmit}
                  className="w-full bg-pink-400 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-pink-500 transition-all"
                >
                  一鍵報備：我運動完了！✨
                </button>
              )}
            </div>
          </div>

          <div className="space-y-4">
            <h3 className="font-black text-gray-800 flex items-center gap-2 px-2">
              <History size={20} className="text-pink-400" />
              我的努力紀錄 ({history.length})
            </h3>
            <div className="space-y-3">
              {history.length === 0 ? (
                <div className="bg-white p-10 rounded-3xl border border-dashed border-pink-200 text-center text-gray-400 italic">
                  還沒有紀錄喔，開始妳的第一步吧！
                </div>
              ) : (
                history.map((record, idx) => (
                  <div key={idx} className="bg-white p-4 rounded-2xl border border-pink-50 shadow-sm flex justify-between items-center group transition-all hover:border-pink-200">
                    <div className="flex items-center gap-3">
                      <div className="bg-pink-50 p-2 rounded-xl text-pink-400">
                        <Calendar size={18} />
                      </div>
                      <div>
                        <div className="font-bold text-gray-800">{record.date}</div>
                        <div className="text-xs text-green-500 font-bold">已完成回報</div>
                      </div>
                    </div>
                    <div className="text-pink-300">
                      <Heart size={16} fill="currentColor" />
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    function AdminDashboard({ reports, members, onAddMember, onDeleteMember, onManualReport, onBack }) {
      const [activeTab, setActiveTab] = useState('records'); 
      const [newMemberName, setNewMemberName] = useState('');
      const [editingMember, setEditingMember] = useState(null); 
      
      const [expandedDates, setExpandedDates] = useState({});

      const [manualName, setManualName] = useState('');
      const [manualDate, setManualDate] = useState(new Date().toISOString().split('T')[0]);

      const totalMembersCount = members.length;

      const reportsGroupedByDate = useMemo(() => {
        const groups = {};
        reports.forEach(report => {
          if (!groups[report.date]) {
            groups[report.date] = [];
          }
          groups[report.date].push(report);
        });
        return Object.keys(groups)
          .sort((a, b) => new Date(b) - new Date(a))
          .map(date => {
            const count = groups[date].length;
            const percent = totalMembersCount > 0 ? Math.round((count / totalMembersCount) * 100) : 0;
            return { date, records: groups[date], count, percent };
          });
      }, [reports, totalMembersCount]);

      useEffect(() => {
        if (reportsGroupedByDate.length > 0 && Object.keys(expandedDates).length === 0) {
          setExpandedDates({ [reportsGroupedByDate[0].date]: true });
        }
      }, [reportsGroupedByDate]);

      const toggleDate = (date) => {
        setExpandedDates(prev => ({
          ...prev,
          [date]: !prev[date]
        }));
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="flex items-center justify-between px-2">
            <h2 className="text-2xl font-black text-gray-800 flex items-center gap-2">
              <ClipboardList className="text-pink-500" />
              管理後台 👑
            </h2>
          </div>

          <div className="flex bg-white p-1 rounded-2xl border border-pink-100 shadow-sm">
            <button 
              onClick={() => setActiveTab('records')}
              className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${activeTab === 'records' ? 'bg-pink-400 text-white shadow-md' : 'text-gray-400'}`}
            >
              回報紀錄
            </button>
            <button 
              onClick={() => setActiveTab('members')}
              className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${activeTab === 'members' ? 'bg-pink-400 text-white shadow-md' : 'text-gray-400'}`}
            >
              成員管理
            </button>
          </div>

          {activeTab === 'records' ? (
            <div className="space-y-4">
              <div className="bg-white p-5 rounded-[32px] shadow-sm border border-pink-100 space-y-4">
                <h3 className="text-sm font-black text-pink-600 flex items-center gap-2">
                  <CalendarCheck size={18} /> 幫姊妹補打卡
                </h3>
                <div className="grid grid-cols-1 gap-3">
                  <select 
                    value={manualName}
                    onChange={(e) => setManualName(e.target.value)}
                    className="w-full bg-pink-50/50 p-3 rounded-2xl outline-none text-sm border border-transparent focus:border-pink-200"
                  >
                    <option value="">選擇姊妹...</option>
                    {members.map(m => (
                      <option key={m.id} value={m.name}>{m.name}</option>
                    ))}
                  </select>
                  <input 
                    type="date"
                    value={manualDate}
                    onChange={(e) => setManualDate(e.target.value)}
                    className="w-full bg-pink-50/50 p-3 rounded-2xl outline-none text-sm border border-transparent focus:border-pink-200"
                  />
                  <button 
                    onClick={() => {
                      if (manualName) {
                        onManualReport(manualName, manualDate);
                        setManualName('');
                      }
                    }}
                    disabled={!manualName}
                    className={`w-full py-3 rounded-2xl font-black text-sm shadow-sm transition-all ${manualName ? 'bg-pink-400 text-white hover:bg-pink-500' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
                  >
                    確認補打卡
                  </button>
                </div>
              </div>

              <div className="space-y-4">
                {reportsGroupedByDate.length === 0 ? (
                  <div className="bg-white p-12 rounded-[32px] text-center text-gray-300 border border-dashed border-pink-200">
                    目前尚無任何打卡紀錄
                  </div>
                ) : (
                  reportsGroupedByDate.map((group, groupIdx) => {
                    const isExpanded = expandedDates[group.date];
                    return (
                      <div key={groupIdx} className="bg-white rounded-[32px] shadow-sm border border-pink-100 overflow-hidden transition-all">
                        <div 
                          onClick={() => toggleDate(group.date)}
                          className="bg-pink-50 p-4 border-b border-pink-100 flex justify-between items-center cursor-pointer hover:bg-pink-100/50 transition-colors"
                        >
                          <div className="flex items-center gap-2">
                            <Calendar size={16} className="text-pink-400" />
                            <span className="font-black text-pink-600">{group.date}</span>
                            {isExpanded ? <ChevronUp size={14} className="text-pink-300" /> : <ChevronDown size={14} className="text-pink-300" />}
                          </div>
                          <span className="text-[10px] font-bold bg-white px-3 py-1 rounded-full text-pink-500 shadow-sm">
                            {group.count} 人 ({group.percent}%)
                          </span>
                        </div>

                        {isExpanded && (
                          <div className="p-2 space-y-1 animate-in fade-in slide-in-from-top-2 duration-200">
                            {group.records.map((record, rIdx) => (
                              <div key={rIdx} className="flex items-center justify-between p-3 hover:bg-pink-50/30 rounded-2xl transition-colors">
                                <div className="flex items-center gap-3">
                                  <div className="w-8 h-8 bg-pink-100 rounded-lg flex items-center justify-center text-pink-500 font-bold text-xs shadow-inner">
                                    {record.userName?.[0]}
                                  </div>
                                  <span className="font-bold text-gray-700">{record.userName}</span>
                                </div>
                                <div className="flex items-center gap-1 text-green-500">
                                  <CheckCircle2 size={14} />
                                  <span className="text-[10px] font-bold">{record.userId === 'admin-manual' ? '手動補發' : '已完成'}</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          ) : (
            <div className="space-y-4">
              <div className="bg-white p-4 rounded-3xl border border-pink-100 shadow-sm flex gap-2">
                <input 
                  type="text" 
                  value={newMemberName}
                  onChange={(e) => setNewMemberName(e.target.value)}
                  placeholder="新增姊妹名字..."
                  className="flex-1 bg-pink-50/50 px-4 py-2 rounded-xl outline-none text-sm border border-transparent focus:border-pink-200"
                />
                <button 
                  onClick={() => { onAddMember(newMemberName); setNewMemberName(''); }}
                  className="bg-pink-400 text-white p-2 rounded-xl shadow-sm hover:bg-pink-500"
                >
                  <Plus size={20} />
                </button>
              </div>

              <div className="bg-white rounded-[32px] shadow-xl border border-pink-100 overflow-hidden">
                <div className="bg-pink-50 p-4 border-b border-pink-100 flex justify-between items-center">
                  <span className="font-black text-pink-600">目前所有成員</span>
                  <span className="text-xs font-bold bg-white px-2 py-1 rounded-full text-pink-400">{members.length} 人</span>
                </div>
                <div className="divide-y divide-pink-50">
                  {members.map((member) => (
                    <div key={member.id} className="p-4 flex justify-between items-center group hover:bg-pink-50/20">
                      {editingMember?.id === member.id ? (
                        <div className="flex-1 flex gap-2">
                          <input 
                            type="text" 
                            value={editingMember.name}
                            onChange={(e) => setEditingMember({...editingMember, name: e.target.value})}
                            className="flex-1 bg-white border border-pink-200 px-3 py-1 rounded-lg text-sm"
                          />
                          <button onClick={async () => {
                            await onDeleteMember(member.id);
                            await onAddMember(editingMember.name);
                            setEditingMember(null);
                          }} className="text-green-500"><Save size={18} /></button>
                          <button onClick={() => setEditingMember(null)} className="text-gray-400"><X size={18} /></button>
                        </div>
                      ) : (
                        <>
                          <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-pink-100 rounded-lg flex items-center justify-center text-pink-500 font-bold text-xs">
                              {member.name?.[0]}
                            </div>
                            <span className="font-bold text-gray-700">{member.name}</span>
                          </div>
                          <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button 
                              onClick={() => {
                                setActiveTab('records');
                                setManualName(member.name);
                              }}
                              title="幫她補打卡"
                              className="p-1.5 text-pink-400 hover:bg-pink-50 rounded-lg"
                            >
                              <CalendarCheck size={16} />
                            </button>
                            <button onClick={() => setEditingMember({ id: member.id, name: member.name })} className="p-1.5 text-blue-400 hover:bg-blue-50 rounded-lg"><Edit2 size={16} /></button>
                            <button onClick={() => { if(window.confirm(`確定要將 ${member.name} 踢出仙女群組嗎？🥺`)) onDeleteMember(member.id); }} className="p-1.5 text-rose-400 hover:bg-rose-50 rounded-lg"><Trash2 size={16} /></button>
                          </div>
                        </>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
